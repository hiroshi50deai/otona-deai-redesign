<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="50代男性がマッチングアプリでいいねをもらえない理由のアイキャッチ画像">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf5"/>
      <stop offset="0.55" stop-color="#fff1f5"/>
      <stop offset="1" stop-color="#eef3fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#152a4d" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <circle cx="120" cy="115" r="130" fill="#e07a9a" opacity="0.13"/>
  <circle cx="1080" cy="120" r="150" fill="#b99a5b" opacity="0.10"/>
  <circle cx="260" cy="540" r="120" fill="#e07a9a" opacity="0.14"/>
  <rect x="360" y="42" width="480" height="58" rx="29" fill="#e07a9a"/>
  <text x="600" y="80" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="30" font-weight="800" fill="#fff">大人の男の出会い再設計教室</text>
  <text x="600" y="185" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="72" font-weight="900" fill="#152a4d">50代男性が</text>
  <text x="600" y="275" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="76" font-weight="900" fill="#152a4d">マッチングアプリで</text>
  <text x="600" y="365" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="82" font-weight="900" fill="#152a4d"><tspan fill="#e07a9a">いいね</tspan>をもらえない理由</text>
  <text x="600" y="438" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="34" font-weight="800" fill="#152a4d">年齢だけで諦める前に、見直すべきこと</text>
  <g filter="url(#shadow)">
    <rect x="735" y="470" width="300" height="145" rx="22" fill="#fff" stroke="#d9cfc2"/>
    <text x="785" y="517" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="30" font-weight="800" fill="#152a4d">✓ 写真</text>
    <text x="785" y="560" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="30" font-weight="800" fill="#152a4d">✓ 清潔感</text>
    <text x="785" y="603" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="30" font-weight="800" fill="#152a4d">✓ プロフィール</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="115" y="445" width="370" height="118" rx="28" fill="#fff" stroke="#e7ddd0"/>
    <text x="300" y="495" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="26" font-weight="800" fill="#152a4d">なぜマッチしない？</text>
    <text x="300" y="535" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="26" font-weight="800" fill="#152a4d">自分には無理？</text>
  </g>
  <rect x="0" y="620" width="1200" height="55" fill="#152a4d"/>
  <text x="600" y="657" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="28" font-weight="900" fill="#fff">見直すだけで、出会いのチャンスは大きく変わります。</text>
</svg>