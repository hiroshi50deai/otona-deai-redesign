<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="いいねが来ない主な原因マップ">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fffaf5"/><stop offset="1" stop-color="#eef3fb"/></linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#152a4d" flood-opacity="0.14"/></filter>
  </defs>
  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <text x="600" y="92" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="46" font-weight="900" fill="#152a4d">いいねが来ない主な原因マップ</text>
  <text x="600" y="142" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="26" font-weight="700" fill="#6b7280">年齢だけでなく、画面上の“見え方”を分解して考える</text>
  <g filter="url(#s)">
    <rect x="92" y="210" width="210" height="220" rx="26" fill="#fff"/>
    <text x="197" y="280" text-anchor="middle" font-size="54">📷</text>
    <text x="197" y="338" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="31" font-weight="900" fill="#152a4d">写真</text>
    <text x="197" y="382" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#6b7280">暗い・古い・自撮り</text>
  </g>
  <g filter="url(#s)">
    <rect x="360" y="210" width="210" height="220" rx="26" fill="#fff"/>
    <text x="465" y="280" text-anchor="middle" font-size="54">✨</text>
    <text x="465" y="338" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="31" font-weight="900" fill="#152a4d">清潔感</text>
    <text x="465" y="382" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#6b7280">髪・服・表情</text>
  </g>
  <g filter="url(#s)">
    <rect x="628" y="210" width="210" height="220" rx="26" fill="#fff"/>
    <text x="733" y="280" text-anchor="middle" font-size="54">📝</text>
    <text x="733" y="338" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="31" font-weight="900" fill="#152a4d">プロフィール</text>
    <text x="733" y="382" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#6b7280">何者か伝わらない</text>
  </g>
  <g filter="url(#s)">
    <rect x="896" y="210" width="210" height="220" rx="26" fill="#fff"/>
    <text x="1001" y="280" text-anchor="middle" font-size="54">💬</text>
    <text x="1001" y="338" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="31" font-weight="900" fill="#152a4d">メッセージ</text>
    <text x="1001" y="382" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="22" font-weight="700" fill="#6b7280">重い・長い・近い</text>
  </g>
  <rect x="210" y="500" width="780" height="78" rx="39" fill="#152a4d"/>
  <text x="600" y="551" text-anchor="middle" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="30" font-weight="900" fill="#fff">まずは変えられる場所から整える</text>
</svg>